server:
  port: 3306
  servlet:
    context-path: /api/v1
spring:
  application:
    name: supermercado

  # Base de datos H2 en memoria — misma config que application.properties
  datasource:
    url: jdbc:mysql://localhost:3306/supermercado
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    # Typo corregido: era 'hibernxxaate' — ahora muestra los parámetros de cada query
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
